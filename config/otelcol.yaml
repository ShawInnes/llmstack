receivers:
  redis:
    endpoint: "valkey:6379"
    password: ${env:REDIS_AUTH}
    collection_interval: 15s

processors:
  batch:
    timeout: 10s

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: valkey

service:
  pipelines:
    metrics:
      receivers: [redis]
      processors: [batch]
      exporters: [prometheus]
